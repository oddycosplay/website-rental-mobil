server {
    listen 80;
    server_name localhost;

    # Routes to Backend (Laravel API, Admin panel, Livewire, Auth)
    location ~ ^/(api|admin|livewire|storage|login|logout|register|forgot-password|reset-password|user|sanctum) {
        proxy_pass http://backend_web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback all other routes to Frontend (Vue 3 SPA)
    location / {
        proxy_pass http://frontend_web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
